<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Daily Todo</title>

<style>
body{
    font-family: Arial;
    max-width:700px;
    margin:auto;
    padding:20px;
}

.task{
    border:1px solid #ddd;
    padding:10px;
    margin-top:10px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

button{
    margin-left:5px;
}
</style>
</head>

<body>

<h2>Daily Todo</h2>

<input type="date" id="dayPicker">

<h3>Add task</h3>

<input id="taskInput" placeholder="Task description">
<button onclick="addTask()">Add</button>

<h3>Tasks</h3>
<div id="taskList"></div>

<script>

let tasks = JSON.parse(localStorage.getItem("tasks") || "[]")

const picker = document.getElementById("dayPicker")
picker.valueAsDate = new Date()

function save(){
    localStorage.setItem("tasks", JSON.stringify(tasks))
}

function addTask(){

    const text = document.getElementById("taskInput").value
    const day = picker.value

    if(!text) return

    tasks.push({
        id: Date.now(),
        text,
        day,
        moves:0
    })

    document.getElementById("taskInput").value = ""

    save()
    render()
}

function moveTask(id){

    const task = tasks.find(t => t.id === id)

    let d = new Date(task.day)
    d.setDate(d.getDate()+1)

    task.day = d.toISOString().slice(0,10)
    task.moves++

    save()
    render()
}

function removeTask(id){

    tasks = tasks.filter(t => t.id !== id)

    save()
    render()
}

function editTask(id){

    const task = tasks.find(t => t.id === id)

    const newText = prompt("Edit task:", task.text)

    if(newText === null) return
    if(!newText.trim()) return

    task.text = newText

    save()
    render()
}

function render(){

    const day = picker.value
    const list = document.getElementById("taskList")

    list.innerHTML = ""

    tasks
        .filter(t => t.day === day)
        .forEach(task => {

            const div = document.createElement("div")
            div.className="task"

            div.innerHTML = `
                <span>
                    ${task.text} (moved ${task.moves})
                </span>

                <div>
                    <button onclick="editTask(${task.id})">Edit</button>
                    <button onclick="moveTask(${task.id})">Move</button>
                    <button onclick="removeTask(${task.id})">Remove</button>
                </div>
            `

            list.appendChild(div)

        })
}

picker.onchange = render

render()

</script>

</body>
</html>
