<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Daily Todo</title>

<style>
body{
    font-family: Arial;
    max-width:700px;
    margin:auto;
    padding:20px;
}

.task{
    border:1px solid #ddd;
    padding:10px;
    margin-top:10px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.completed{
    text-decoration: line-through;
    opacity:0.6;
}

button{
    margin-left:4px;
}
</style>
</head>

<body>

<h2>Daily Todo</h2>

<input type="date" id="dayPicker">

<h3>Add task</h3>

<input id="taskInput" placeholder="Task description" autocomplete="off">
<button onclick="addTask()">Add</button>

<br><br>
<button id="toggleIncompleteBtn" onclick="toggleIncomplete()">
Show Only Incomplete: OFF
</button>

<h3>Tasks</h3>
<div id="taskList"></div>

<script>

let tasks = JSON.parse(localStorage.getItem("tasks") || "[]")
let showOnlyIncomplete = false

const picker = document.getElementById("dayPicker")
const taskInput = document.getElementById("taskInput")
const toggleBtn = document.getElementById("toggleIncompleteBtn")

const savedDay = localStorage.getItem("selectedDay")

if(savedDay){
    picker.value = savedDay
}else{
    picker.valueAsDate = new Date()
}

function save(){
    localStorage.setItem("tasks", JSON.stringify(tasks))
}

function addTask(){

    const text = taskInput.value.trim()
    const day = picker.value

    if(!text) return

    tasks.push({
        id: Date.now(),
        text,
        day,
        moves:0,
        completed:false
    })

    taskInput.value = ""
    taskInput.focus()

    save()
    render()
}

function moveTask(id){

    const task = tasks.find(t => t.id === id)

    let d = new Date(task.day)
    d.setDate(d.getDate()+1)

    task.day = d.toISOString().slice(0,10)
    task.moves++

    save()
    render()
}

function removeTask(id){

    tasks = tasks.filter(t => t.id !== id)

    save()
    render()
}

function editTask(id){

    const task = tasks.find(t => t.id === id)

    const newText = prompt("Edit task:", task.text)

    if(newText === null) return
    if(!newText.trim()) return

    task.text = newText.trim()

    save()
    render()
}

function toggleComplete(id){

    const task = tasks.find(t => t.id === id)
    task.completed = !task.completed

    save()
    render()
}

function moveUp(id){

    const day = picker.value
    const dayTasks = tasks.filter(t => t.day === day)

    const index = dayTasks.findIndex(t => t.id === id)

    if(index <= 0) return

    const current = tasks.indexOf(dayTasks[index])
    const above = tasks.indexOf(dayTasks[index-1])

    const temp = tasks[current]
    tasks[current] = tasks[above]
    tasks[above] = temp

    save()
    render()
}

function moveDown(id){

    const day = picker.value
    const dayTasks = tasks.filter(t => t.day === day)

    const index = dayTasks.findIndex(t => t.id === id)

    if(index === -1 || index >= dayTasks.length-1) return

    const current = tasks.indexOf(dayTasks[index])
    const below = tasks.indexOf(dayTasks[index+1])

    const temp = tasks[current]
    tasks[current] = tasks[below]
    tasks[below] = temp

    save()
    render()
}

function toggleIncomplete(){

    showOnlyIncomplete = !showOnlyIncomplete

    toggleBtn.textContent =
        "Show Only Incomplete: " + (showOnlyIncomplete ? "ON" : "OFF")

    render()
}

function render(){

    const day = picker.value
    const list = document.getElementById("taskList")

    localStorage.setItem("selectedDay", day)

    list.innerHTML = ""

    let dayTasks = tasks.filter(t => t.day === day)

    if(showOnlyIncomplete){
        dayTasks = dayTasks.filter(t => !t.completed)
    }

    dayTasks = dayTasks.sort((a,b)=> a.completed - b.completed)

    dayTasks.forEach(task => {

        const div = document.createElement("div")
        div.className = "task " + (task.completed ? "completed" : "")

        const moveLabel = task.moves > 0 ? ` (${task.moves})` : ""

        div.innerHTML = `
            <span>
                ${task.text}${moveLabel}
            </span>

            <div>
                <button onclick="toggleComplete(${task.id})">
                    ${task.completed ? "Undo" : "Done"}
                </button>

                <button onclick="moveUp(${task.id})">↑</button>
                <button onclick="moveDown(${task.id})">↓</button>

                <button onclick="editTask(${task.id})">Edit</button>
                <button onclick="moveTask(${task.id})">Next Day</button>
                <button onclick="removeTask(${task.id})">Remove</button>
            </div>
        `

        list.appendChild(div)

    })
}

picker.onchange = render

taskInput.addEventListener("keydown", e => {
    if(e.key === "Enter"){
        addTask()
    }
})

render()

</script>

</body>
</html>
